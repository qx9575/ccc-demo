description: |
  创建一个字符串处理工具模块：

  1. 在 src/ 目录下创建 string_utils.py
  2. 实现以下函数：

     truncate(text: str, max_length: int) -> str
     - 截断文本到指定长度
     - 如果文本超过长度，添加 "..." 后缀
     - 如果文本小于等于长度，原样返回

     capitalize_words(text: str) -> str
     - 将每个单词的首字母大写
     - 其他字母小写

     remove_whitespace(text: str) -> str
     - 移除多余空白字符
     - 多个连续空格变成一个
     - 移除首尾空白

  3. 在 tests/ 目录下创建测试文件
  4. 运行测试确保通过
