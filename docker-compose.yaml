version: '3.8'

services:
  agent-coder:
    build:
      context: .
      dockerfile: Dockerfile
    image: agent-v0.1:latest
    container_name: agent-coder
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://maas-api.ai-yuanjing.com/openapi/compatible-mode/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-glm-5}
      - AGENT_ID=coder-agent-1
      - AGENT_ROLE=coder
      - AGENT_NAME=程序员
      - WORKSPACE=/workspace
    volumes:
      - ./:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    # 启动交互模式（无参数）

